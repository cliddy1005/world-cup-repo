function flag(t){return FL[t]||"🏳️"}function $(id){return document.getElementById(id)}
const SC={win:3,draw:1,goal:1,cs:2};const MULT={Group:1,R32:1.5,R16:2,QF:2.5,SF:3,Final:4,"3rd":3};const PICK_COUNT=4;const OUTRIGHT_BONUS=30;const PREDICT_RESULT_POINTS=5;const PREDICT_EXACT_BONUS=10;
const FB_CFG={apiKey:"AIzaSyCjO4BbIGpTiY9Faff97a0Um3HL6dKoKHk",authDomain:"wc-pool-2026.firebaseapp.com",databaseURL:"https://wc-pool-2026-default-rtdb.europe-west1.firebasedatabase.app",projectId:"wc-pool-2026",storageBucket:"wc-pool-2026.firebasestorage.app",messagingSenderId:"459996582195",appId:"1:459996582195:web:48ade9f994d8e97d1fae46"};
let db,fbReady=false,listenersStarted=false;let S={user:null,isAdmin:false,pools:{},fixtures:{},knockout:{},admins:{},predictions:{},meta:{},activePool:null};let cv=null;let authMode="signup";let previousScores={};let suppressGoalAnimation=true;
const NAV=[{id:"dashboard",ic:"🏠",l:"Home"},{id:"leaderboard",ic:"🏆",l:"Table"},{id:"picks",ic:"⚽",l:"Picks"},{id:"predict",ic:"🎯",l:"Predict"},{id:"h2h",ic:"⚔️",l:"H2H"},{id:"schedule",ic:"📅",l:"Games"}];
function initFB(){try{firebase.initializeApp(FB_CFG);db=firebase.database();fbReady=true;return true}catch(e){console.error(e);return false}}
async function loadState(){if(!fbReady)return;const [poolsSnap,fxSnap,koSnap,admSnap,metaSnap]=await Promise.all([db.ref("pools").once("value"),db.ref("fixtures").once("value"),db.ref("knockout").once("value"),db.ref("admins").once("value"),db.ref("meta").once("value")]);S.pools=poolsSnap.val()||{};S.fixtures=fxSnap.val()||{};S.knockout=koSnap.val()||{};S.admins=admSnap.val()||{};S.predictions={};S.meta=metaSnap.val()||{};rememberScores()}
function savePool(pid){if(!fbReady||!pid)return;if(S.isAdmin){db.ref("pools/"+pid).set(S.pools[pid]);return}if(S.user&&S.pools[pid]?.participants?.[S.user.uid])db.ref("pools/"+pid+"/participants/"+S.user.uid).set(S.pools[pid].participants[S.user.uid])}function savePrediction(pid,dateKey,matchId,uid,data){if(fbReady)db.ref(`predictions/${pid}/${dateKey}/${matchId}/${uid}`).set(data)}
function listen(){if(!fbReady||listenersStarted)return;listenersStarted=true;db.ref("pools").on("value",snap=>{S.pools=snap.val()||{};if(cv)render(cv)});db.ref("fixtures").on("value",snap=>{S.fixtures=snap.val()||{};detectGoalsFromUpdate();if(cv)render(cv)});db.ref("knockout").on("value",snap=>{S.knockout=snap.val()||{};detectGoalsFromUpdate();if(cv)render(cv)});db.ref("admins").on("value",snap=>{S.admins=snap.val()||{};if(S.user)S.isAdmin=!!S.admins[S.user.uid];if(cv)render(cv)});db.ref("meta").on("value",snap=>{S.meta=snap.val()||{};if(cv)render(cv)})}
let activePredictionsRef=null;function listenPredictionsForActivePool(){if(!fbReady||!S.activePool)return;if(activePredictionsRef)activePredictionsRef.off();activePredictionsRef=db.ref("predictions/"+S.activePool);activePredictionsRef.on("value",snap=>{S.predictions={...S.predictions,[S.activePool]:snap.val()||{}};if(cv)render(cv)},err=>{console.warn("Predictions listener error:",err.message);S.predictions={...S.predictions,[S.activePool]:{}};if(cv)render(cv)})}
function allMatches(){return[...Object.values(S.fixtures),...Object.values(S.knockout)]}function scoreTotal(f){const h=Number(f?.hs),a=Number(f?.as);if(Number.isNaN(h)||Number.isNaN(a))return null;return h+a}function allCurrentMatchesMap(){const map={};allMatches().forEach(f=>map[String(f.id)]=f);return map}function rememberScores(){previousScores={};Object.entries(allCurrentMatchesMap()).forEach(([id,f])=>{previousScores[id]={total:scoreTotal(f),hs:f.hs,as:f.as}})}
function detectGoalsFromUpdate(){if(suppressGoalAnimation){rememberScores();suppressGoalAnimation=false;return}const map=allCurrentMatchesMap();Object.entries(map).forEach(([id,f])=>{const old=previousScores[id],total=scoreTotal(f);if(!old||total===null){previousScores[id]={total,hs:f.hs,as:f.as};return}if(total>old.total){let scoringTeam="";if(Number(f.hs)>Number(old.hs))scoringTeam=f.h;else if(Number(f.as)>Number(old.as))scoringTeam=f.a;showGoalOverlay(f,scoringTeam)}previousScores[id]={total,hs:f.hs,as:f.as}})}
function showGoalOverlay(match,scoringTeam){const overlay=$("goal-overlay"),teams=$("goal-teams"),score=$("goal-score");if(!overlay||!teams||!score)return;teams.textContent=scoringTeam?`${scoringTeam} scored`:`${match.h} vs ${match.a}`;score.textContent=`${match.h} ${match.hs??0} - ${match.as??0} ${match.a}`;overlay.classList.remove("hidden");clearTimeout(window.__goalTimer);window.__goalTimer=setTimeout(()=>overlay.classList.add("hidden"),3000)}
function getGroups(){const groups={};Object.values(S.fixtures).filter(f=>f.s==="Group"&&f.g).forEach(f=>{if(!groups[f.g])groups[f.g]=new Set();groups[f.g].add(f.h);groups[f.g].add(f.a)});const sorted={};Object.keys(groups).sort().forEach(g=>sorted[g]=[...groups[g]].sort());return sorted}function getAllTeams(){return Object.values(getGroups()).flat()}function getTeamGroup(t){for(const[grp,teams]of Object.entries(getGroups()))if(teams.includes(t))return grp;return"?"}
function getMatchWinner(f){if(!f||!f.done)return null;if(typeof f.hs==="number"&&typeof f.as==="number"){if(f.hs>f.as)return f.h;if(f.as>f.hs)return f.a}if(f.pen&&Array.isArray(f.pen)){if(f.pen[0]>f.pen[1])return f.h;if(f.pen[1]>f.pen[0])return f.a}return null}function getTournamentWinner(){return getMatchWinner(Object.values(S.knockout).find(f=>f.s==="Final"&&f.done))}
function teamPts(team){let pts=0;allMatches().filter(f=>f.done&&(f.h===team||f.a===team)).forEach(f=>{const m=MULT[f.s]||1,sc=f.h===team?f.hs:f.as,co=f.h===team?f.as:f.hs;if(sc>co)pts+=SC.win*m;else if(sc===co)pts+=SC.draw*m;pts+=sc*SC.goal*m;if(co===0)pts+=SC.cs*m});return Math.round(pts*10)/10}function teamGD(team){let gf=0,ga=0;allMatches().filter(f=>f.done&&(f.h===team||f.a===team)).forEach(f=>{gf+=f.h===team?f.hs:f.as;ga+=f.h===team?f.as:f.hs});return gf-ga}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}function fixtureDateKey(f){if(!f?.dt)return"";const m=String(f.dt).match(/^(\d{4}-\d{2}-\d{2})/);if(m)return m[1];const d=new Date(f.dt);if(Number.isNaN(d.getTime()))return"";return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function predictionPoints(pred,match){if(!pred||!match||!match.done)return 0;const ph=Number(pred.hs),pa=Number(pred.as),ah=Number(match.hs),aa=Number(match.as);if([ph,pa,ah,aa].some(n=>Number.isNaN(n)))return 0;const pr=ph>pa?"H":ph<pa?"A":"D",ar=ah>aa?"H":ah<aa?"A":"D";if(pr!==ar)return 0;return PREDICT_RESULT_POINTS+(ph===ah&&pa===aa?PREDICT_EXACT_BONUS:0)}
function getPredictionTotal(pid,uid){let total=0;const poolPreds=S.predictions?.[pid]||{},byId={};allMatches().forEach(m=>byId[String(m.id)]=m);Object.values(poolPreds).forEach(dayObj=>Object.entries(dayObj||{}).forEach(([matchId,userObj])=>total+=predictionPoints(userObj?.[uid],byId[String(matchId)])));return total}
function getDailyPredictionLeaderboard(pid,dateKey){const pool=S.pools[pid];if(!pool?.participants)return[];const dayPreds=S.predictions?.[pid]?.[dateKey]||{},byId={};allMatches().forEach(m=>byId[String(m.id)]=m);return Object.values(pool.participants).map(p=>{let total=0,exacts=0,counted=0;Object.entries(dayPreds).forEach(([matchId,userObj])=>{const match=byId[String(matchId)],pred=userObj?.[p.id];if(!pred||!match||!match.done)return;const pts=predictionPoints(pred,match);total+=pts;counted++;if(Number(pred.hs)===Number(match.hs)&&Number(pred.as)===Number(match.as))exacts++});return{...p,predictionPts:total,exacts,counted}}).sort((a,b)=>b.predictionPts-a.predictionPts||b.exacts-a.exacts)}
function getPredictableMatchesForToday(){const t=todayKey(),matches=allMatches();let todays=matches.filter(f=>fixtureDateKey(f)===t);if(todays.length)return{dateKey:t,matches:todays};const future=matches.filter(f=>!f.done&&fixtureDateKey(f)).sort((a,b)=>fixtureDateKey(a).localeCompare(fixtureDateKey(b)));if(future.length){const d=fixtureDateKey(future[0]);return{dateKey:d,matches:future.filter(f=>fixtureDateKey(f)===d)}}const latest=matches.filter(f=>f.done&&fixtureDateKey(f)).sort((a,b)=>fixtureDateKey(b).localeCompare(fixtureDateKey(a)));if(latest.length){const d=fixtureDateKey(latest[0]);return{dateKey:d,matches:latest.filter(f=>fixtureDateKey(f)===d)}}return{dateKey:t,matches:[]}}

async function syncScores(){try{const res=await fetch("/api/sync",{method:"POST"}),data=await res.json();if(!res.ok)throw new Error(data.error||"Sync failed");alert(`Synced ${data.matchCount} matches from football-data.org ✅`)}catch(e){alert("Sync error: "+e.message)}if(cv)render(cv)}async function syncScoresAuto(){if(cv)render(cv)}
function rAdmin(){if(!S.isAdmin)return`<div class="cd tc"><p class="tm">Admin access required</p></div>`;const apiWinner=getTournamentWinner(),meta=S.meta?.footballData||{};let h=`<div class="fb mb12"><div class="st" style="margin:0">ADMIN PANEL</div><button class="btn-s btn-o" onclick="goView(S.activePool?'dashboard':'pool-select')">← Back</button></div><div class="cd"><div class="lb">football-data.org Sync</div><p class="tx tm mb8">Backend syncs can run every 10s during live games and are capped by a rolling per-minute request budget.</p>${meta.lastSyncedAt?`<p class="tx tm mb8">Last synced: ${new Date(meta.lastSyncedAt).toLocaleString()} · ${meta.matchCount||0} matches${typeof meta.liveMatchCount==="number"?` · ${meta.liveMatchCount} live`:""}</p>`:""}<button class="btn" onclick="syncScores()">Sync Now</button></div><div class="cd"><div class="lb">Animation Test</div><p class="tx tm mb8">Simulates a goal overlay without changing real scores.</p><button class="btn btn-o" onclick="testGoalAnimation()">Test Goal Animation</button></div><div class="cd"><div class="lb">Create New Pool</div><input id="np-name" class="inp mb8" placeholder="Pool name"><input id="np-code" class="inp mb8" placeholder="Invite code" style="text-transform:uppercase;letter-spacing:2px"><button class="btn" onclick="createPool()">Create Pool</button></div>`;Object.entries(S.pools).forEach(([pid,pool])=>{const count=Object.keys(pool.participants||{}).length,picked=Object.values(pool.participants||{}).filter(p=>(p.picks||[]).length>=PICK_COUNT).length;h+=`<div class="cd"><div class="fb mb8"><div class="ts fw6">${pool.name}</div><span class="pill">${count} players</span></div><div class="tx tm mb8">Code: <strong class="tg2">${pool.code}</strong> · ${picked}/${count} picked</div><div class="fw"><button class="btn-s ${pool.regOpen?'btn-g':'btn-d'}" onclick="togglePoolReg('${pid}')">${pool.regOpen?'Reg Open ✓':'Reg Closed ✗'}</button><button class="btn-s ${pool.pickingLocked?'btn-d':'btn-g'}" onclick="togglePicks('${pid}')">${pool.pickingLocked?'Picks Locked 🔒':'Picks Open ✓'}</button><button class="btn-s btn-d" onclick="deletePool('${pid}')">Delete</button></div></div>`});h+=`<div class="cd cd-g"><div class="lb">🏆 Tournament Winner</div>${apiWinner?`<p class="ts fw6">${flag(apiWinner)} ${apiWinner}</p><p class="tx tm mt8">Detected automatically from the synced Final result.</p>`:`<p class="ts tm">Not decided yet.</p>`}</div>`;const users=[];Object.values(S.pools).forEach(p=>Object.values(p.participants||{}).forEach(u=>{if(!users.some(x=>x.uid===u.id))users.push({uid:u.id,name:u.name,email:u.email})}));h+=`<div class="cd"><div class="lb">🔑 Admin Management</div>`;Object.keys(S.admins).filter(k=>S.admins[k]).forEach(uid=>{const u=users.find(x=>x.uid===uid);h+=`<div class="fb" style="padding:5px 0;border-bottom:1px solid var(--brd)"><div><div class="tx fw6">${u?.name||uid.substring(0,12)}</div><div class="tx tm">${u?.email||""}</div></div>${uid!==S.user.uid?`<button class="btn-s btn-d" onclick="removeAdmin('${uid}')">Remove</button>`:`<span class="pill">You</span>`}</div>`});const nonAdmins=users.filter(u=>!S.admins[u.uid]);if(nonAdmins.length){h+=`<select class="inp mt12" id="add-admin-sel"><option value="">Promote user…</option>${nonAdmins.map(u=>`<option value="${u.uid}">${u.name} (${u.email||"no email"})</option>`).join("")}</select><button class="btn-s btn-g mt8" onclick="const v=$('add-admin-sel').value;if(v){addAdmin(v);render('admin')}">Make Admin</button>`}h+=`</div>`;return h}
function testGoalAnimation(){showGoalOverlay({h:"Ireland",a:"England",hs:1,as:0},"Ireland")}function createPool(){const name=$("np-name").value.trim(),code=$("np-code").value.trim().toUpperCase();if(!name||!code){alert("Enter a name and invite code");return}if(Object.values(S.pools).some(p=>String(p.code).toUpperCase()===code)){alert("That code is already in use");return}const pid="pool_"+Date.now();S.pools[pid]={name,code,regOpen:true,pickingLocked:false,participants:{},createdBy:S.user.uid};savePool(pid);render("admin")}function togglePoolReg(pid){S.pools[pid].regOpen=!S.pools[pid].regOpen;savePool(pid);render("admin")}function togglePicks(pid){S.pools[pid].pickingLocked=!S.pools[pid].pickingLocked;savePool(pid);render("admin")}function deletePool(pid){if(!confirm("Delete this pool?"))return;if(fbReady)db.ref("pools/"+pid).remove();delete S.pools[pid];render("admin")}function addAdmin(uid){if(!S.isAdmin)return;S.admins[uid]=true;db.ref("admins/"+uid).set(true)}function removeAdmin(uid){if(!S.isAdmin||uid===S.user.uid)return;delete S.admins[uid];db.ref("admins/"+uid).remove()}
function setMode(m){authMode=m;$("name-row").style.display=m==="signup"?"block":"none";$("tab-su").style.background=m==="signup"?"rgba(201,168,76,.15)":"rgba(255,255,255,.03)";$("tab-su").style.color=m==="signup"?"#C9A84C":"#8B95A5";$("tab-si").style.background=m==="signin"?"rgba(201,168,76,.15)":"rgba(255,255,255,.03)";$("tab-si").style.color=m==="signin"?"#C9A84C":"#8B95A5";$("forgot-row").classList.toggle("hidden",m==="signup");$("login-err").classList.add("hidden");document.querySelector("#v-login .btn").textContent=m==="signup"?"CREATE ACCOUNT":"SIGN IN"}
async function googleSignIn(){const err=$("login-err");err.classList.add("hidden");try{const prov=new firebase.auth.GoogleAuthProvider(),cred=await firebase.auth().signInWithPopup(prov);S.user=cred.user;await loadState();listen();S.isAdmin=!!S.admins[cred.user.uid];enterApp()}catch(e){if(e.code!=="auth/popup-closed-by-user"){err.textContent=e.message;err.classList.remove("hidden")}}}
async function emailSignIn(){const err=$("login-err");err.classList.add("hidden");const email=$("l-email").value.trim(),pass=$("l-pass").value;if(!email){err.textContent="Enter your email";err.classList.remove("hidden");return}if(!pass||pass.length<6){err.textContent="Password must be at least 6 characters";err.classList.remove("hidden");return}try{let cred;if(authMode==="signup"){const name=$("l-name").value.trim();if(!name){err.textContent="Enter a display name";err.classList.remove("hidden");return}cred=await firebase.auth().createUserWithEmailAndPassword(email,pass);await cred.user.updateProfile({displayName:name})}else cred=await firebase.auth().signInWithEmailAndPassword(email,pass);S.user=cred.user;await loadState();listen();S.isAdmin=!!S.admins[cred.user.uid];enterApp()}catch(e){err.textContent=e.code==="auth/email-already-in-use"?"Email already registered — try Sign In":e.code==="auth/user-not-found"?"No account found — try Sign Up":e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"?"Wrong email or password":e.message;err.classList.remove("hidden")}}
async function resetPw(){const email=$("l-email").value.trim();if(!email){alert("Enter your email first");return}try{await firebase.auth().sendPasswordResetEmail(email);alert("Reset email sent") }catch(e){alert(e.message)}}
function enterApp(){$("loader").classList.add("hidden");$("app").classList.remove("hidden");$("v-login").classList.add("hidden");$("v-main").classList.remove("hidden");$("hdr-user").textContent=S.user.displayName||S.user.email;if(S.isAdmin)$("admin-btn").classList.remove("hidden");else $("admin-btn").classList.add("hidden");buildNav();syncScoresAuto();const saved=localStorage.getItem("wc-active");if(saved&&S.pools[saved]?.participants?.[S.user.uid]){S.activePool=saved;listenPredictionsForActivePool();goView("dashboard")}else goView("pool-select")}function logout(){firebase.auth().signOut().finally(()=>location.reload())}
document.addEventListener("DOMContentLoaded",async()=>{initFB();firebase.auth().onAuthStateChanged(async user=>{if(user){S.user=user;await loadState();listen();S.isAdmin=!!S.admins[user.uid];enterApp()}else{$("loader").classList.add("hidden");$("app").classList.remove("hidden");$("v-login").classList.remove("hidden");$("v-main").classList.add("hidden")}})});
</script>
